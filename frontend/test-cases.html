<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试用例导出</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f12;
            --surface: #1a1a20;
            --sidebar-bg: #141418;
            --border: #2d2d35;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text: #e4e4e7;
            --text-muted: #a1a1aa;
            --success: #22c55e;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        .sidebar-bg { background: var(--sidebar-bg); }
        .sidebar { width: 240px; min-height: 100vh; border-right: 1px solid var(--border); padding: 1.5rem 0; }
        .sidebar-title { padding: 0 1.25rem 1rem; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .nav-item { display: block; padding: 0.75rem 1.25rem; color: var(--text-muted); text-decoration: none; font-size: 0.95rem; transition: color 0.2s, background 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { color: var(--text); background: rgba(99, 102, 241, 0.08); }
        .nav-item.active { color: var(--accent); background: rgba(99, 102, 241, 0.12); border-left-color: var(--accent); }

        .page-layout { display: flex; min-height: 100vh; }
        .page-content { flex: 1; padding: 1.5rem 2rem; display: flex; flex-direction: column; background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.08), transparent); }

        .page-title { font-size: 1.5rem; margin-bottom: 1rem; font-weight: 600; }

        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            max-width: 720px;
            margin-bottom: 1.5rem;
        }

        .section-title { font-size: 1rem; color: var(--accent); margin-bottom: 1rem; font-weight: 500; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem; }

        .textarea-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.95rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            min-height: 160px;
            resize: vertical;
        }
        .textarea-input:focus { outline: none; border-color: var(--accent); }
        .textarea-input::placeholder { color: var(--text-muted); opacity: 0.7; }

        .btn { padding: 0.5rem 1.25rem; font-size: 0.9rem; font-weight: 500; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; }
        .error-msg { font-size: 0.875rem; color: var(--error); margin-top: 0.75rem; }
    </style>
</head>
<body>
    <div class="page-layout">
        <aside class="sidebar sidebar-bg">
            <div class="sidebar-title">导航</div>
            <a href="/" class="nav-item" data-path="/">家有学霸问题查询</a>
            <a href="/online-issue-query" class="nav-item" data-path="/online-issue-query">线上问题查询</a>
            <a href="/binary-sort" class="nav-item" data-path="/binary-sort">二分法排序</a>
            <a href="/url-encrypt-decrypt" class="nav-item" data-path="/url-encrypt-decrypt">URL 加解密</a>
            <a href="/timestamp-convert" class="nav-item" data-path="/timestamp-convert">时间戳转换</a>
            <a href="/json-parse" class="nav-item" data-path="/json-parse">JSON 在线解析</a>
            <a href="/data-process" class="nav-item" data-path="/data-process">数据处理</a>
            <a href="/test-cases" class="nav-item active" data-path="/test-cases">测试用例</a>
            <a href="/mobile-cipher" class="nav-item" data-path="/mobile-cipher">手机号加解密</a>
        </aside>
        <script>
            (function() {
                var path = location.pathname.replace(/\/$/, '') || '/';
                document.querySelectorAll('.nav-item').forEach(function(a) {
                    var p = a.getAttribute('data-path');
                    a.classList.toggle('active', (p === '/' && (path === '/' || path === '/issue-query')) || (p === path));
                });
            })();
        </script>
        <main class="page-content">
            <h1 class="page-title">测试用例导出</h1>

            <div class="tool-card">
                <div class="section-title">AI 生成功能测试用例</div>
                <div class="form-group">
                    <label for="requirement-input">需求描述</label>
                    <textarea id="requirement-input" class="textarea-input" placeholder="请输入需求描述，例如：&#10;登录页面根据手机号和验证码登录&#10;用户注册需支持手机号、验证码、设置密码"></textarea>
                </div>
                <div class="hint">根据需求描述调用 AI 生成测试用例并导出为 Excel（带格式），需配置 OPENAI_API_KEY 或 DOUBAO_API_KEY</div>
                <div id="error-msg" class="error-msg" style="display:none;"></div>
                <button type="button" class="btn" id="btn-export" style="margin-top: 1rem;">导出用例</button>
            </div>
        </main>
    </div>

    <script>
        (function() {
            var API_BASE = window.location.origin;
            var requirementInput = document.getElementById('requirement-input');
            var btnExport = document.getElementById('btn-export');
            var errorMsg = document.getElementById('error-msg');

            btnExport.addEventListener('click', function() {
                var requirement = (requirementInput.value || '').trim();
                if (!requirement) {
                    errorMsg.textContent = '请输入需求描述';
                    errorMsg.style.display = 'block';
                    return;
                }

                errorMsg.style.display = 'none';
                btnExport.disabled = true;
                btnExport.textContent = '生成中...';

                fetch(API_BASE + '/api/export-test-cases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requirement: requirement })
                })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.error) throw new Error(data.error);
                        var binary = atob(data.xlsx || data.csv);
                        var bytes = new Uint8Array(binary.length);
                        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        var blob = new Blob([bytes], { type: data.xlsx ? 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' : 'text/csv;charset=utf-8' });
                        var url = URL.createObjectURL(blob);
                        var a = document.createElement('a');
                        a.href = url;
                        a.download = data.filename || '功能测试用例.xlsx';
                        a.click();
                        URL.revokeObjectURL(url);
                        btnExport.textContent = '导出用例';
                    })
                    .catch(function(e) {
                        errorMsg.textContent = '导出失败: ' + (e.message || '未知错误');
                        errorMsg.style.display = 'block';
                        btnExport.textContent = '导出用例';
                    })
                    .finally(function() {
                        btnExport.disabled = false;
                    });
            });
        })();
    </script>
</body>
</html>
